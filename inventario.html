<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>De Grão em Grão - Registro</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="app-bar">
        <h1>De Grão em Grão</h1>
        <p>Gestão de Banco de Alimentos</p>
    </header>

    <main class="container">
        <section class="section-title">
            <h2>Registro de Inventário</h2>
            <p>Adicione novos itens ao inventário do banco de alimentos</p>
        </section>

        <div class="form-card">
            <form id="inventory-form">
                
                <div class="input-group">
                    <input type="text" id="product-name" placeholder="Nome do Produto *" required>
                </div>

                <div class="input-group">
                    <input type="date" id="expiry-date" required placeholder="Data de Validade *">
                </div>

                <div class="input-group">
                    <input type="number" id="quantity" placeholder="Quantidade (unidades) *" min="1" required>
                </div>

                <button type="submit" class="btn-submit">
                    <span class="material-icons-outlined">add_circle</span>
                    Adicionar ao Inventário
                </button>

            </form>
        </div>
    </main>

    <nav class="bottom-navigation">
        <a href="index.html" class="nav-item">
            <span class="material-icons-outlined">home</span>
            <span>Painel</span>
        </a>
        <a href="inventario.html" class="nav-item active">
            <span class="material-icons-outlined">add_box</span>
            <span>Registrar</span>
        </a>
        <a href="distribuicao.html" class="nav-item">
            <span class="material-icons-outlined">send</span>
            <span>Enviar</span>
        </a>
    </nav>
    <script src="js/main.js"></script>
</body>
</html>
