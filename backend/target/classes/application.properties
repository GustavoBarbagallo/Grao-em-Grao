# ============================================================
# DE GRÃO EM GRÃO — Configurações da Aplicação
# ============================================================

server.port=8080

# ------------------------------------------------------------
# BANCO DE DADOS — Configure a seção correspondente ao seu BD
# ------------------------------------------------------------

# --- OPÇÃO 1: H2 (banco em memória, somente para testes) ----
# Descomente este bloco para rodar sem banco externo:
#
# spring.datasource.url=jdbc:h2:mem:degraoEmgraoDb
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# --- OPÇÃO 2: PostgreSQL (recomendado para produção) ---------
# Descomente e preencha com suas credenciais:
#
# spring.datasource.url=jdbc:postgresql://localhost:5432/degraoEmgraoDb
# spring.datasource.username=SEU_USUARIO
# spring.datasource.password=SUA_SENHA
# spring.datasource.driver-class-name=org.postgresql.Driver

# --- OPÇÃO 3: MySQL ------------------------------------------
# Descomente e preencha com suas credenciais:
#
spring.datasource.url=jdbc:mysql://localhost:3306/degrao_em_grao?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=root_senha_forte
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ------------------------------------------------------------
# JPA / Hibernate
# ------------------------------------------------------------
# create-drop: recria tabelas a cada reinício (desenvolvimento)
# update: mantém dados entre reinícios (uso geral)
# validate: apenas valida o esquema (produção)
# spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ------------------------------------------------------------
# CORS — permite o frontend local acessar a API
# ------------------------------------------------------------
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:5500

# ------------------------------------------------------------
# Alertas FEFO (dias de antecedência para alertar vencimento)
# ------------------------------------------------------------
app.fefo.alert-days=7
